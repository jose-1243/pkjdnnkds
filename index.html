<script>

    const instanciaDB = supabase.createClient(CONFIG_URL, CONFIG_KEY);

    async function verificarAhora() {
        const palla = document.getElementById('monitor');
        const uDigitado = document.getElementById('campoUser').value.trim();
        const pDigitado = document.getElementById('campoPass').value.trim();

        palla.innerHTML = ">> Extrayendo registros de la base de datos...";

        try {
            // CAMBIO CLAVE: Traemos TODO sin filtrar en la nube para ver qué llega
            const { data, error } = await instanciaDB.from('usuarios').select('*');

            if (error) throw error;

            if (!data || data.length === 0) {
                palla.innerHTML = "<div class='fail'>>> ERROR: La base de datos devolvió 0 registros. Revisa el RLS en Supabase.</div>";
                return;
            }

            palla.innerHTML = `>> Registros recibidos: ${data.length}. Analizando...<br>`;

            let exito = false;

            data.forEach(fila => {
                const uDB = String(fila.username).trim();
                const pDB = String(fila.password).trim();

                // Mostramos en pantalla qué está comparando exactamente
                palla.innerHTML += `> Comparando: [${uDigitado}] con [${uDB}]... `;

                if (uDB === uDigitado && pDB === pDigitado) {
                    exito = true;
                    palla.innerHTML += "<span class='match'>COINCIDE</span><br>";
                } else {
                    palla.innerHTML += "<span class='fail'>NO COINCIDE</span><br>";
                }
            });

            if (exito) {
                alert("¡SISTEMA DESBLOQUEADO!");
            }

        } catch (err) {
            palla.innerHTML = `<div class="fail">ERROR DE CONEXIÓN: ${err.message}</div>`;
        }
    }
</script>
