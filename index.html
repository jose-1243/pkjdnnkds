<script>
    const URL_FINAL = "https://cmqgzwgqvpxuzmivxjcp.supabase.co".trim();
    const KEY_FINAL = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcWd6d2dxdnB4dXptaXZ4amNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDk0NzQsImV4cCI6MjA5MDEyNTQ3NH0.yxukU3-y26DNLdCfEymPNgUSGmHorhuQNPng_fEkWOo".trim();
    
    const db = supabase.createClient(URL_FINAL, KEY_FINAL);

    async function verificarAhora() {
        const palla = document.getElementById('monitor');
        const uDig = document.getElementById('campoUser').value.trim();
        const pDig = document.getElementById('campoPass').value.trim();

        palla.innerHTML = "<b>SISTEMA DE RASTREO ACTIVO...</b><br>";

        try {
            // PRUEBA A: ¿La tabla existe y es legible?
            const { data, error } = await db.from('usuarios').select('*');

            if (error) {
                palla.innerHTML += `<div class="fail">ERROR DE SUPABASE: ${error.message} (Código: ${error.code})</div>`;
                return;
            }

            // PRUEBA B: ¿Hay datos?
            if (!data || data.length === 0) {
                palla.innerHTML += `<div class="fail">LA TABLA DEVUELVE 0 FILAS. <br>Esto significa que el RLS está activado en Supabase y no deja leer nada.</div>`;
                return;
            }

            palla.innerHTML += `Registros encontrados: ${data.length}<br>`;

            // PRUEBA C: Comparación binaria
            let encontrado = false;
            data.forEach(f => {
                const uDB = String(f.username).trim();
                const pDB = String(f.password).trim();
                
                palla.innerHTML += `Comparando: [${uDig}] vs [${uDB}] -> `;

                if (uDB === uDig && pDB === pDig) {
                    encontrado = true;
                    palla.innerHTML += "<span class='match'>¡IGUALES!</span><br>";
                } else {
                    palla.innerHTML += "<span class='fail'>DIFERENTES</span><br>";
                }
            });

            if (encontrado) alert("¡LOGUEADO!");

        } catch (e) {
            palla.innerHTML += `<div class="fail">FALLO TOTAL: ${e.message}</div>`;
        }
    }
</script>
