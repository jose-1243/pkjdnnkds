<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS SOCIAL | FASE 3</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #7c3aed; --bg: #0b0f1a; --card: #161b2c; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* --- ACCESO --- */
        #auth-screen { height: 100vh; display: flex; justify-content: center; align-items: center; width: 100%; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 24px; width: 380px; border: 1px solid var(--border); text-align: center; }
        .tabs { display: flex; margin-bottom: 25px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; border: none; background: none; color: white; cursor: pointer; border-radius: 8px; font-weight: 600; }
        .tab.active { background: var(--primary); }
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; }
        .btn { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }

        /* --- APP --- */
        #main-app { display: none; width: 100%; max-width: 600px; padding: 40px 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .post-creator { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 30px; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 18px; resize: none; outline: none; height: 100px; font-family: inherit; }
        .feed-item { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-meta { display: flex; align-items: center; margin-bottom: 15px; }
        .avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 800; margin-right: 15px; }
        .post-actions { display: flex; gap: 20px; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>Nexus Social</h1>
            <div class="tabs">
                <button id="t-login" class="tab active" onclick="setMode('login')">Ingresar</button>
                <button id="t-reg" class="tab" onclick="setMode('reg')">Registrarse</button>
            </div>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn" onclick="execAuth()" id="mainBtn">ENTRAR AL NEXO</button>
            <div id="status" style="margin-top:15px; font-size: 13px;"></div>
        </div>
    </div>

    <div id="main-app">
        <header>
            <h2 id="welcome-title">Bienvenido</h2>
            <button onclick="logout()" style="background:none; border:none; color:#ff4444; cursor:pointer;">SALIR</button>
        </header>

        <div class="post-creator">
            <textarea id="postInput" placeholder="¿Qué estás pensando?"></textarea>
            <div style="text-align: right;">
                <button class="btn" id="btnPublicar" style="width: 140px;" onclick="publicarPost()">Publicar</button>
            </div>
        </div>

        <div id="feed-container"></div>
    </div>

    <script>
        const SB_URL = "https://cmqgzwgqvpxuzmivxjcp.supabase.co";
        const SB_KEY = "sb_publishable_jM1_oVJyaoB_03tMbw9m8w_69_ODcVr";
        const db = supabase.createClient(SB_URL, SB_KEY);

        let mode = 'login';
        let currentUser = null;

        function setMode(m) {
            mode = m;
            document.getElementById('t-login').classList.toggle('active', m === 'login');
            document.getElementById('t-reg').classList.toggle('active', m === 'reg');
            document.getElementById('mainBtn').innerText = m === 'login' ? 'ENTRAR AL NEXO' : 'CREAR MI CUENTA';
        }

        async function execAuth() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const status = document.getElementById('status');
            if (!u || !p) return status.innerHTML = "⚠️ Llena los campos";

            if (mode === 'reg') {
                const { error } = await db.from('usuarios').insert([{ username: u, password: p }]);
                if (error) status.innerHTML = "❌ " + error.message;
                else { status.innerHTML = "✅ Registrado con éxito"; setMode('login'); }
            } else {
                const { data } = await db.from('usuarios').select('*');
                const match = data.find(f => f.username.toLowerCase() === u.toLowerCase() && f.password === p);
                if (match) iniciarApp(match.username);
                else status.innerHTML = "❌ Datos incorrectos";
            }
        }

        function iniciarApp(username) {
            currentUser = username;
            localStorage.setItem('nexus_session', username);
            document.getElementById('auth-screen').style.display = "none";
            document.getElementById('main-app').style.display = "block";
            document.getElementById('welcome-title').innerText = "Hola, " + username;
            cargarPostsReales();
        }

        // --- NUEVA LÓGICA DE FASE 3 (CONEXIÓN A DB) ---
        async function publicarPost() {
            const content = document.getElementById('postInput').value.trim();
            const btn = document.getElementById('btnPublicar');
            if (!content) return;

            btn.disabled = true;
            btn.innerText = "Enviando...";

            const { error } = await db.from('posts').insert([
                { autor: currentUser, texto: content }
            ]);

            if (error) {
                alert("Error al publicar");
            } else {
                document.getElementById('postInput').value = "";
                cargarPostsReales(); // Recargamos para ver el nuevo post
            }
            btn.disabled = false;
            btn.innerText = "Publicar";
        }

        async function cargarPostsReales() {
            const container = document.getElementById('feed-container');
            
            // Traemos los posts ordenados por el más reciente
            const { data, error } = await db.from('posts').select('*').order('created_at', { ascending: false });

            if (error) return console.log("Error cargando posts");

            container.innerHTML = ""; // Limpiar feed
            data.forEach(post => {
                const fecha = new Date(post.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                renderizarPost({ autor: post.autor, texto: post.texto, hora: fecha });
            });
        }

        function renderizarPost(post) {
            const container = document.getElementById('feed-container');
            const inicial = post.autor.charAt(0).toUpperCase();
            const postHTML = `
                <div class="feed-item">
                    <div class="user-meta">
                        <div class="avatar">${inicial}</div>
                        <div>
                            <p style="font-weight:600">${post.autor}</p>
                            <p style="font-size:12px; opacity:0.4">${post.hora}</p>
                        </div>
                    </div>
                    <div class="post-body">${post.texto}</div>
                    <div class="post-actions">
                        <span><i class="far fa-heart"></i> Me gusta</span>
                        <span><i class="far fa-comment"></i> Comentar</span>
                    </div>
                </div>
            `;
            container.innerHTML += postHTML;
        }

        function logout() { localStorage.removeItem('nexus_session'); location.reload(); }
        const sesion = localStorage.getItem('nexus_session');
        if (sesion) iniciarApp(sesion);
    </script>
</body>
</html>
