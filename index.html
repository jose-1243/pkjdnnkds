<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CENTRAL | ACCESO RESTRINGIDO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* =========================================
           1. VARIABLES Y RESET
           ========================================= */
        :root {
            --p-color: #00f2fe;    /* Principal: Cian */
            --s-color: #4facfe;    /* Secundario: Azul */
            --bg-dark: #05070a;    /* Fondo Profundo */
            --card-bg: rgba(13, 17, 23, 0.85);
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --error: #ff4d4d;
            --success: #00ff88;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --glitch-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: crosshair;
        }

        body, html {
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow: hidden; /* Evita scroll durante animaciones */
        }

        /* =========================================
           2. FONDO ANIMADO (GRID & PARTICLES)
           ========================================= */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, #05070a, #0d1117);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-50%);
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        /* =========================================
           3. CONTENEDOR PRINCIPAL
           ========================================= */
        .main-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-module {
            position: relative;
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 4px; /* Estilo industrial cuadrado */
            padding: 40px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            animation: moduleEntry 1s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes moduleEntry {
            0% { transform: scale(0.8) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Decoración de esquinas */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--p-color);
        }
        .top-left { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .top-right { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .bottom-right { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        /* =========================================
           4. TIPOGRAFÍA Y ENCABEZADOS
           ========================================= */
        .header-section {
            text-align: left;
            margin-bottom: 40px;
            border-left: 4px solid var(--p-color);
            padding-left: 15px;
        }

        .header-section h1 {
            font-size: 12px;
            color: var(--p-color);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 5px;
        }

        .header-section h2 {
            font-size: 24px;
            font-weight: 300;
            color: var(--text-main);
        }

        /* =========================================
           5. FORMULARIO E INPUTS
           ========================================= */
        .form-group {
            position: relative;
            margin-bottom: 30px;
        }

        .form-group i {
            position: absolute;
            left: 0;
            top: 12px;
            color: var(--p-color);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 10px 10px 30px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-bottom-color: var(--p-color);
            background: rgba(0, 242, 254, 0.02);
        }

        .form-group label {
            position: absolute;
            left: 30px;
            top: 10px;
            color: var(--text-dim);
            pointer-events: none;
            transition: 0.3s;
            font-size: 14px;
            text-transform: uppercase;
        }

        .form-group input:focus ~ label,
        .form-group input:valid ~ label {
            top: -15px;
            left: 0;
            font-size: 10px;
            color: var(--p-color);
        }

        /* =========================================
           6. BOTONES Y ACCIONES
           ========================================= */
        .btn-container {
            margin-top: 40px;
        }

        .main-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--p-color);
            color: var(--p-color);
            padding: 15px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
        }

        .main-btn:hover {
            background: var(--p-color);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        /* Efecto de escaneo en el botón */
        .main-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .main-btn:hover::after {
            left: 100%;
        }

        /* =========================================
           7. TERMINAL DE ESTADO
           ========================================= */
        .status-terminal {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: var(--text-dim);
            height: 80px;
            overflow-y: hidden;
        }

        .status-line {
            margin-bottom: 4px;
            display: block;
        }

        .status-line::before {
            content: "> ";
            color: var(--p-color);
        }

        /* =========================================
           8. PANTALLA DE ÉXITO (DASHBOARD)
           ========================================= */
        #dashboard {
            display: none;
            width: 100%;
            max-width: 1200px;
            padding: 40px;
            animation: fadeIn 1s forwards;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 254, 0.1);
            padding: 20px;
            border-radius: 4px;
        }

        /* =========================================
           9. RESPONSIVE
           ========================================= */
        @media (max-width: 480px) {
            .login-module { padding: 25px; }
            .header-section h2 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="canvas-bg"></div>
    <div class="grid-overlay"></div>

    <div class="main-wrapper">
        
        <div id="login-module" class="login-module">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>

            <div class="header-section">
                <h1>Security Protocol</h1>
                <h2>Identificación Requerida</h2>
            </div>

            <div class="form-container">
                <div class="form-group">
                    <i class="fa-solid fa-user-secret"></i>
                    <input type="text" id="user" required placeholder=" ">
                    <label>Terminal User</label>
                </div>

                <div class="form-group">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="pass" required placeholder=" ">
                    <label>Access Code</label>
                </div>

                <div class="btn-container">
                    <button class="main-btn" onclick="ejecutarAcceso()">
                        <i class="fa-solid fa-shield-halved"></i> Validar Identidad
                    </button>
                </div>
            </div>

            <div class="status-terminal" id="terminal">
                <span class="status-line">Sistema en espera...</span>
                <span class="status-line">Esperando entrada de datos...</span>
            </div>
        </div>

        <div id="dashboard">
            <div class="header-section">
                <h1>Access Granted</h1>
                <h2 id="welcome-msg">Bienvenido, Agente</h2>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Red Local</h3>
                    <p style="color: var(--p-color);">ESTADO: ACTIVO</p>
                </div>
                <div class="stat-card">
                    <h3>Servidor Supabase</h3>
                    <p style="color: var(--success);">LATENCIA: 24ms</p>
                </div>
                <div class="stat-card">
                    <h3>Ubicación IP</h3>
                    <p id="ip-display">Detectando...</p>
                </div>
            </div>
            
            <button class="main-btn" style="margin-top: 30px; width: 200px;" onclick="location.reload()">
                Cerrar Sesión
            </button>
        </div>

    </div>

    <script>
        // 1. CONFIGURACIÓN
        const SB_URL = "https://cmqgzwgqvpxuzmivxjcp.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcWd6d2dxdnB4dXptaXZ4amNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDk0NzQsImV4cCI6MjA5MDEyNTQ3NH0.yxukU3-y26DNLdCfEymPNgUSGmHorhuQNPng_fEkWOo";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        const terminal = document.getElementById('terminal');

        // 2. UTILIDADES DE TERMINAL
        function log(msg, color = null) {
            const line = document.createElement('span');
            line.className = 'status-line';
            line.innerText = msg;
            if(color) line.style.color = color;
            terminal.appendChild(line);
            
            // Auto scroll
            if (terminal.childNodes.length > 5) {
                terminal.removeChild(terminal.firstChild);
            }
        }

        // 3. LÓGICA DE ACCESO
        async function ejecutarAcceso() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            if(!user || !pass) {
                log("ERROR: Campos vacíos detectados.", "#ff4d4d");
                return;
            }

            log("Iniciando apretón de manos con Supabase...");
            log("Cifrando paquetes de datos...");

            try {
                // CONSULTA A LA BASE DE DATOS
                const { data, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('username', user)
                    .eq('password', pass);

                await new Promise(r => setTimeout(r, 1500)); // Delay estético

                if (error) throw error;

                if (data && data.length > 0) {
                    log("CONEXIÓN ESTABLECIDA.", "#00ff88");
                    log("Token de acceso verificado.");
                    log("Cargando interfaz de usuario...");
                    
                    setTimeout(() => mostrarDashboard(data[0].username), 800);
                } else {
                    log("FALLO DE AUTENTICACIÓN: Usuario desconocido.", "#ff4d4d");
                    log("Alerta de seguridad enviada al servidor.");
                }

            } catch (err) {
                log("ERROR CRÍTICO: " + err.message, "#ff4d4d");
            }
        }

        // 4. CAMBIO DE PANTALLA
        function mostrarDashboard(name) {
            document.getElementById('login-module').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "Bienvenido, Operador " + name.toUpperCase();
            
            // Simular detección de IP
            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('ip-display').innerText = data.ip;
                });
        }

        // 5. EFECTOS VISUALES (MOUSE PARALLAX)
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            document.querySelector('.grid-overlay').style.transform = 
                `perspective(500px) rotateX(60deg) translateY(-50%) translateX(${(x - 0.5) * 50}px)`;
        });
    </script>
</body>
</html>
