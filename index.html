<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS OS | FULL STACK MONOLITH</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* =========================================
           SISTEMA DE DISEÑO CORE
           ========================================= */
        :root {
            --primary: #8b5cf6;
            --primary-rgb: 139, 92, 246;
            --primary-dark: #6d28d9;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg-deep: #030712;
            --bg-main: #0b0f1a;
            --card-bg: rgba(22, 27, 44, 0.7);
            --card-hover: rgba(31, 41, 55, 0.9);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f9fafb;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(at 0% 0%, rgba(var(--primary-rgb), 0.15) 0, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        /* Componentes Base */
        .nexus-input {
            width: 100%; padding: 16px 20px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border); border-radius: 16px; color: white;
            font-family: inherit; transition: all 0.3s;
        }
        .nexus-input:focus { border-color: var(--primary); background: rgba(15, 23, 42, 0.8); }

        .nexus-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            padding: 14px 28px; border-radius: 16px; border: none; cursor: pointer;
            font-weight: 700; transition: all 0.3s; text-transform: uppercase;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(var(--primary-rgb), 0.5); }

        /* =========================================
           LAYOUTS
           ========================================= */
        #auth-engine {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; z-index: 9999;
            background: var(--bg-deep);
        }
        .auth-portal {
            width: 100%; max-width: 450px; background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 32px; padding: 50px; text-align: center;
        }

        #nexus-app-root { display: none; height: 100vh; grid-template-columns: 280px 1fr; opacity: 0; }

        .nexus-nav {
            background: rgba(3, 7, 18, 0.5); border-right: 1px solid var(--glass-border);
            padding: 40px 20px; display: flex; flex-direction: column;
        }
        .nav-link {
            display: flex; align-items: center; gap: 15px; padding: 16px 20px;
            border-radius: 16px; color: var(--text-dim); text-decoration: none;
            font-weight: 600; margin-bottom: 8px; transition: all 0.3s; cursor: pointer;
        }
        .nav-link:hover, .nav-link.active { background: rgba(var(--primary-rgb), 0.1); color: var(--primary); }

        .nexus-viewport { height: 100vh; overflow-y: scroll; padding: 0 40px; }
        .viewport-header {
            position: sticky; top: 0; z-index: 100; background: rgba(11, 15, 26, 0.8);
            backdrop-filter: blur(15px); padding: 25px 0; border-bottom: 1px solid var(--glass-border);
            margin-bottom: 30px;
        }

        .nexus-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 30px; margin-bottom: 25px;
        }

        /* =========================================
           MÓDULO DE MENSAJERÍA (DMs)
           ========================================= */
        .chat-layout { display: grid; grid-template-columns: 300px 1fr; gap: 20px; height: calc(100vh - 120px); }
        
        .chat-sidebar {
            background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
            border-radius: 24px; overflow-y: auto; padding: 15px;
        }
        .user-chat-item {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            border-radius: 16px; cursor: pointer; transition: all 0.2s;
            border: 1px solid transparent;
        }
        .user-chat-item:hover { background: rgba(255,255,255,0.05); }
        .user-chat-item.active { background: rgba(var(--primary-rgb), 0.15); border-color: rgba(var(--primary-rgb), 0.3); }
        
        .chat-window {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header {
            padding: 20px; border-bottom: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3); display: flex; align-items: center; gap: 15px;
        }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-bubble { max-width: 70%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; }
        .msg-received { background: rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 5px; }
        .msg-sent { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 5px; }

        .chat-input-area { padding: 20px; border-top: 1px solid var(--glass-border); display: flex; gap: 10px; }

        /* Toasts */
        .nexus-toast-container { position: fixed; bottom: 40px; right: 40px; z-index: 10000; }
        .nexus-toast {
            background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
            padding: 16px 24px; border-radius: 16px; margin-top: 10px; display: flex; align-items: center; gap: 15px;
        }

    </style>
</head>
<body>

    <div id="toast-master" class="nexus-toast-container"></div>

    <div id="auth-engine">
        <div class="auth-portal">
            <h1 style="font-size: 3rem; font-weight: 900; color: var(--primary); margin-bottom: 30px;">NEXUS</h1>
            <input type="text" id="user-core" class="nexus-input" placeholder="Usuario" style="margin-bottom: 15px;">
            <input type="password" id="pass-core" class="nexus-input" placeholder="Contraseña" style="margin-bottom: 25px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button onclick="handleAuth('login')" class="nexus-btn btn-primary" id="btn-login-main">ENTRAR</button>
                <button onclick="handleAuth('signup')" class="nexus-btn" style="background: rgba(255,255,255,0.05); color: white;">REGISTRO</button>
            </div>
            <div id="auth-loader" style="display: none; margin-top: 20px;"><i class="fas fa-spinner fa-spin" style="color: var(--primary)"></i></div>
        </div>
    </div>

    <div id="nexus-app-root">
        
        <nav class="nexus-nav">
            <div style="font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 50px; padding-left: 15px;">NEXUS.</div>
            <a class="nav-link active" onclick="navTo('feed', this)"><i class="fas fa-stream"></i> Global Feed</a>
            <a class="nav-link" onclick="navTo('messages', this)"><i class="fas fa-envelope"></i> Mensajes Directos</a>
            <a class="nav-link" onclick="navTo('profile', this)"><i class="fas fa-user-astronaut"></i> Configuración</a>
            
            <div style="margin-top: auto;">
                <div style="padding: 15px; background: rgba(0,0,0,0.2); border-radius: 16px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center;">
                    <div style="width: 35px; height: 35px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold;" id="current-user-avatar">?</div>
                    <div>
                        <p id="current-user-name" style="font-weight: 700; font-size: 0.9rem;">User</p>
                        <p style="font-size: 0.7rem; color: var(--success);">● Conectado</p>
                    </div>
                </div>
                <button onclick="systemLogout()" class="nexus-btn" style="width: 100%; background: rgba(239, 68, 68, 0.1); color: var(--danger);">SALIR</button>
            </div>
        </nav>

        <main class="nexus-viewport">
            
            <div id="view-feed" class="view-content">
                <header class="viewport-header">
                    <h1 style="font-weight: 900;">STREAMING <span style="color: var(--primary)">GLOBAL</span></h1>
                </header>
                <div class="nexus-card" style="border-style: dashed; background: rgba(139, 92, 246, 0.05);">
                    <textarea id="post-input-main" class="nexus-input" style="min-height: 100px; margin-bottom: 15px; background: transparent; border: none; font-size: 1.1rem;" placeholder="Escribe un mensaje o pega un link de imagen..."></textarea>
                    <div style="display:flex; justify-content:flex-end;">
                        <button onclick="dispatchPost()" class="nexus-btn btn-primary" id="btn-post">PUBLICAR <i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
                <div id="feed-render-engine"></div>
            </div>

            <div id="view-messages" class="view-content" style="display:none">
                <header class="viewport-header">
                    <h1 style="font-weight: 900;">COMUNICACIÓN <span style="color: var(--primary)">SEGURA</span></h1>
                </header>
                <div class="chat-layout">
                    <div class="chat-sidebar" id="dm-user-list">
                        <p style="text-align:center; color:var(--text-dim); margin-top: 20px;"><i class="fas fa-spinner fa-spin"></i> Cargando red...</p>
                    </div>
                    
                    <div class="chat-window">
                        <div class="chat-header" id="chat-header-info">
                            <h3 style="color:var(--text-dim);">Selecciona un usuario para iniciar conexión</h3>
                        </div>
                        <div class="chat-messages" id="dm-message-area"></div>
                        <div class="chat-input-area" id="dm-input-area" style="opacity: 0.5; pointer-events: none;">
                            <input type="text" id="dm-input" class="nexus-input" placeholder="Transmisión encriptada..." onkeypress="if(event.key === 'Enter') sendDM()">
                            <button onclick="sendDM()" class="nexus-btn btn-primary" style="padding: 0 25px;"><i class="fas fa-location-arrow"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-profile" class="view-content" style="display:none">
                <header class="viewport-header">
                    <h1 style="font-weight: 900;">SISTEMA DE <span style="color: var(--primary)">SEGURIDAD</span></h1>
                </header>
                <div class="nexus-card">
                    <p style="color:var(--text-dim); margin-bottom:15px;">Actualiza tus credenciales de acceso al Nexo.</p>
                    <input type="password" id="profile-new-pass" class="nexus-input" placeholder="Nueva contraseña" style="margin-bottom: 15px;">
                    <button onclick="updateSecurity()" class="nexus-btn btn-primary">ENCRIPTAR NUEVA CLAVE</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        const NEXUS_CONFIG = {
            URL: "https://cmqgzwgqvpxuzmivxjcp.supabase.co",
            KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcWd6d2dxdnB4dXptaXZ4amNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDk0NzQsImV4cCI6MjA5MDEyNTQ3NH0.yxukU3-y26DNLdCfEymPNgUSGmHorhuQNPng_fEkWOo",
            T_USERS: 'usuarios', T_POSTS: 'posts', T_MSG: 'mensajes'
        };

        const db = supabase.createClient(NEXUS_CONFIG.URL, NEXUS_CONFIG.KEY);
        
        let SESSION_USER = null;
        let ACTIVE_CHAT_USER = null;

        // --- AUTH ---
        async function handleAuth(type) {
            const u = document.getElementById('user-core').value.trim();
            const p = document.getElementById('pass-core').value.trim();
            if (!u || !p) return pushToast("Datos requeridos", "warning");

            document.getElementById('auth-loader').style.display = 'block';

            try {
                if (type === 'signup') {
                    const { error } = await db.from(NEXUS_CONFIG.T_USERS).insert([{ username: u, password: p }]);
                    if (error) throw error;
                    pushToast("Identidad creada. Ingresando...", "success");
                }
                const { data, error } = await db.from(NEXUS_CONFIG.T_USERS).select('*');
                if (error) throw error;

                const user = data.find(x => x.username.toLowerCase() === u.toLowerCase() && x.password === p);
                if (user) startNexus(user.username);
                else pushToast("Credenciales rechazadas", "danger");
            } catch (err) { pushToast("Error: " + err.message, "danger"); }
            finally { document.getElementById('auth-loader').style.display = 'none'; }
        }

        function startNexus(username) {
            SESSION_USER = username;
            localStorage.setItem('nx_token', username);
            
            gsap.to("#auth-engine", { duration: 0.6, opacity: 0, onComplete: () => {
                document.getElementById('auth-engine').style.display = 'none';
                document.getElementById('nexus-app-root').style.display = 'grid';
                gsap.to("#nexus-app-root", { duration: 0.5, opacity: 1 });
            }});

            document.getElementById('current-user-name').innerText = username;
            document.getElementById('current-user-avatar').innerText = username.charAt(0).toUpperCase();
            
            loadFeed();
            setupRealtime();
        }

        // --- NAVEGACIÓN ---
        function navTo(view, el) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(el) el.classList.add('active');
            
            document.querySelectorAll('.view-content').forEach(v => v.style.display = 'none');
            document.getElementById(`view-${view}`).style.display = 'block';

            if(view === 'messages') loadDMsSidebar();
        }

        // --- FEED CORE ---
        async function loadFeed() {
            const { data } = await db.from(NEXUS_CONFIG.T_POSTS).select('*').order('created_at', { ascending: false });
            const container = document.getElementById('feed-render-engine');
            container.innerHTML = '';
            data?.forEach(p => renderPost(p));
        }

        async function dispatchPost() {
            const txt = document.getElementById('post-input-main').value.trim();
            if(!txt) return;
            document.getElementById('btn-post').disabled = true;

            await db.from(NEXUS_CONFIG.T_POSTS).insert([{ autor: SESSION_USER, texto: txt, likes: 0, created_at: new Date().toISOString() }]);
            document.getElementById('post-input-main').value = '';
            document.getElementById('btn-post').disabled = false;
        }

        function renderPost(post, top=false) {
            if(document.getElementById(`post-${post.id}`)) return;
            const isOwner = post.autor === SESSION_USER;
            
            const imgMatch = post.texto.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i);
            const textLimpio = post.texto.replace(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i, '');

            const html = `
                <div class="nexus-card" id="post-${post.id}">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <strong style="color:var(--primary)">${post.autor}</strong>
                        ${isOwner ? `<i class="fas fa-trash" style="color:var(--danger); cursor:pointer;" onclick="deletePost(${post.id})"></i>` : ''}
                    </div>
                    <p style="margin-bottom:15px">${textLimpio}</p>
                    ${imgMatch ? `<img src="${imgMatch[0]}" style="width:100%; border-radius:12px; margin-bottom:15px;">` : ''}
                    <div style="border-top:1px solid var(--glass-border); padding-top:10px;">
                        <span style="color:var(--text-dim)"><i class="fas fa-heart"></i> ${post.likes || 0}</span>
                    </div>
                </div>
            `;
            const container = document.getElementById('feed-render-engine');
            top ? container.insertAdjacentHTML('afterbegin', html) : container.insertAdjacentHTML('beforeend', html);
        }

        async function deletePost(id) {
            await db.from(NEXUS_CONFIG.T_POSTS).delete().eq('id', id);
            document.getElementById(`post-${id}`)?.remove();
        }

        // --- DM ENGINE (SISTEMA DE MENSAJERÍA) ---
        async function loadDMsSidebar() {
            const list = document.getElementById('dm-user-list');
            const { data, error } = await db.from(NEXUS_CONFIG.T_USERS).select('username');
            
            if(error) return list.innerHTML = '<p>Error de red.</p>';
            
            list.innerHTML = '';
            data.filter(u => u.username !== SESSION_USER).forEach(u => {
                list.innerHTML += `
                    <div class="user-chat-item" onclick="openChat('${u.username}')" id="chat-tab-${u.username}">
                        <div style="width:40px; height:40px; background:var(--primary); border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:bold;">
                            ${u.username.charAt(0).toUpperCase()}
                        </div>
                        <span style="font-weight:600">${u.username}</span>
                    </div>
                `;
            });
        }

        async function openChat(targetUser) {
            ACTIVE_CHAT_USER = targetUser;
            
            document.querySelectorAll('.user-chat-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`chat-tab-${targetUser}`).classList.add('active');
            
            document.getElementById('chat-header-info').innerHTML = `
                <div style="width:30px; height:30px; background:var(--primary); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:bold;">${targetUser.charAt(0).toUpperCase()}</div>
                <h3 style="margin:0">${targetUser}</h3>
            `;
            
            const inputArea = document.getElementById('dm-input-area');
            inputArea.style.opacity = '1';
            inputArea.style.pointerEvents = 'auto';

            fetchMessages();
        }

        async function fetchMessages() {
            const area = document.getElementById('dm-message-area');
            area.innerHTML = '<p style="text-align:center; color:var(--text-dim);">Desencriptando historial...</p>';

            // Simulación de búsqueda de mensajes cruzados (A->B o B->A)
            // Requiere tabla 'mensajes' con: id, emisor, receptor, texto, created_at
            const { data, error } = await db.from(NEXUS_CONFIG.T_MSG)
                .select('*')
                .or(`emisor.eq.${SESSION_USER},receptor.eq.${SESSION_USER}`)
                .order('created_at', { ascending: true });

            area.innerHTML = '';
            if(error || !data.length) {
                area.innerHTML = '<p style="text-align:center; color:var(--text-dim); margin-top:50px;">Canal seguro establecido. Di hola.</p>';
                return;
            }

            const chatFilter = data.filter(m => 
                (m.emisor === SESSION_USER && m.receptor === ACTIVE_CHAT_USER) || 
                (m.emisor === ACTIVE_CHAT_USER && m.receptor === SESSION_USER)
            );

            chatFilter.forEach(msg => renderDM(msg));
            area.scrollTop = area.scrollHeight;
        }

        async function sendDM() {
            const input = document.getElementById('dm-input');
            const txt = input.value.trim();
            if(!txt || !ACTIVE_CHAT_USER) return;

            input.value = '';
            
            // Insertar en BD
            await db.from(NEXUS_CONFIG.T_MSG).insert([{
                emisor: SESSION_USER,
                receptor: ACTIVE_CHAT_USER,
                texto: txt,
                created_at: new Date().toISOString()
            }]);
        }

        function renderDM(msg) {
            const area = document.getElementById('dm-message-area');
            const isMine = msg.emisor === SESSION_USER;
            const bubbleClass = isMine ? 'msg-sent' : 'msg-received';
            
            // Si el mensaje de bienvenida ("Di hola") está ahí, lo borramos
            if(area.innerHTML.includes('Canal seguro')) area.innerHTML = '';

            area.insertAdjacentHTML('beforeend', `<div class="msg-bubble ${bubbleClass}">${msg.texto}</div>`);
            area.scrollTop = area.scrollHeight;
        }

        // --- REALTIME & UTILIDADES ---
        function setupRealtime() {
            // Escuchar Posts
            db.channel('public:posts')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: NEXUS_CONFIG.T_POSTS }, p => renderPost(p.new, true))
                .on('postgres_changes', { event: 'DELETE', schema: 'public', table: NEXUS_CONFIG.T_POSTS }, p => document.getElementById(`post-${p.old.id}`)?.remove())
                .subscribe();

            // Escuchar DMs
            db.channel('public:mensajes')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: NEXUS_CONFIG.T_MSG }, payload => {
                    const m = payload.new;
                    // Solo renderizar si el mensaje pertenece al chat activo
                    if ((m.emisor === SESSION_USER && m.receptor === ACTIVE_CHAT_USER) || 
                        (m.emisor === ACTIVE_CHAT_USER && m.receptor === SESSION_USER)) {
                        renderDM(m);
                    } else if (m.receptor === SESSION_USER) {
                        pushToast(`📩 Nuevo mensaje de ${m.emisor}`, "success");
                    }
                }).subscribe();
        }

        function pushToast(msg, type='primary') {
            const container = document.getElementById('toast-master');
            const t = document.createElement('div');
            t.className = 'nexus-toast';
            t.style.borderLeft = `4px solid var(--${type})`;
            t.innerHTML = `<strong>Sistema:</strong> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { gsap.to(t, {opacity: 0, x: 50, onComplete: () => t.remove()})}, 3000);
        }

        function systemLogout() { localStorage.removeItem('nx_token'); location.reload(); }

        // Auto-Login
        const token = localStorage.getItem('nx_token');
        if(token) startNexus(token);

    </script>
</body>
</html>
