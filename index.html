<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS SOCIAL | FULL STACK</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* MANTENEMOS TU DISEÑO EXACTO */
        :root { 
            --primary: #7c3aed; 
            --primary-hover: #6d28d9;
            --bg: #0b0f1a; 
            --card: #161b2c; 
            --border: rgba(255,255,255,0.1);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text-main); line-height: 1.6; }

        #auth-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at top right, #1e1b4b, #0b0f1a); }
        .auth-card { background: var(--card); padding: 40px; border-radius: 28px; width: 100%; max-width: 400px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        .logo-area h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; background: linear-gradient(to right, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .tabs { display: flex; gap: 10px; margin: 25px 0; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 15px; }
        .tab { flex: 1; padding: 12px; border: none; background: none; color: var(--text-dim); cursor: pointer; border-radius: 10px; font-weight: 600; }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3); }

        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 1rem; }
        input:focus { border-color: var(--primary); outline: none; background: rgba(15, 23, 42, 0.8); }

        .btn { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #main-app { display: none; width: 100%; max-width: 650px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        
        .post-creator { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 1.2rem; resize: none; outline: none; min-height: 80px; font-family: inherit; }
        
        .feed-item { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px; position: relative; }
        .user-meta { display: flex; align-items: center; margin-bottom: 15px; }
        .avatar { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), #4c1d95); border-radius: 16px; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 1.2rem; margin-right: 15px; }
        
        .post-body { font-size: 1.1rem; color: #e2e8f0; margin-bottom: 20px; white-space: pre-wrap; }
        
        .post-actions { display: flex; gap: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .action-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 500; }
        .action-btn:hover { color: var(--primary); }

        /* --- NUEVAS ANIMACIONES (AGREGADAS) --- */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        .feed-item { animation: slideIn 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        #online-indicator { animation: pulse-dot 2s infinite; }

        /* --- DISEÑO DE PERFIL (MODAL AGREGADO) --- */
        #profile-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 200;
            justify-content: center; align-items: center;
        }
        .profile-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 30px; border-radius: 28px; width: 90%; max-width: 400px; text-align: center;
        }
        .profile-avatar-big {
            width: 80px; height: 80px; background: var(--primary); 
            border-radius: 24px; margin: 0 auto 15px; display: flex;
            justify-content: center; align-items: center; font-size: 2rem; font-weight: 800;
        }
        
        .action-btn.active-like { color: #f43f5e; font-weight: 600; }
        .action-btn.active-like i { font-weight: 900; }
        .delete-btn { position: absolute; top: 25px; right: 25px; color: #ef4444; opacity: 0.3; cursor: pointer; background: none; border: none; }
        .delete-btn:hover { opacity: 1; }
        #status { font-weight: 500; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="logo-area">
                <h1>NEXUS</h1>
                <p style="color: var(--text-dim)">Tu conexión con el mundo</p>
            </div>
            <div class="tabs">
                <button id="t-login" class="tab active" onclick="setMode('login')">Ingresar</button>
                <button id="t-reg" class="tab" onclick="setMode('reg')">Unirse</button>
            </div>
            <input type="text" id="user" placeholder="Nombre de usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn" onclick="execAuth()" id="mainBtn">ENTRAR AL SISTEMA</button>
            <div id="status" style="margin-top:20px; font-size: 14px;"></div>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div style="display:flex; align-items:center; gap:10px">
                <div id="online-indicator" style="width:10px; height:10px; border-radius:50%; background:#10b981; box-shadow: 0 0 10px #10b981;"></div>
                <h2 id="welcome-title" style="font-weight: 800;">Hola, Sergi</h2>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="avatar" style="width:35px; height:35px; cursor:pointer; font-size: 0.9rem;" onclick="togglePerfil(true)" id="header-avatar">?</div>
                <button onclick="logout()" style="background:none; border:none; color: var(--text-dim); cursor:pointer; font-weight: 600; font-size: 0.8rem; letter-spacing: 1px;">CERRAR SESIÓN</button>
            </div>
        </header>

        <div class="post-creator">
            <textarea id="postInput" placeholder="¿Qué está pasando en el Nexo?"></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="color: var(--text-dim); font-size: 0.8rem;" id="charCount">0 / 280</span>
                <button class="btn" id="btnPublicar" style="width: 120px; padding: 10px;" onclick="publicarPost()">Publicar</button>
            </div>
        </div>

        <div id="feed-container"></div>
    </div>

    <div id="profile-modal" onclick="if(event.target == this) togglePerfil(false)">
        <div class="profile-card">
            <div class="profile-avatar-big" id="prof-char">?</div>
            <h2 id="prof-name">Usuario</h2>
            <p style="color: var(--text-dim); margin-bottom: 20px;">Miembro de Nexus Social</p>
            <input type="password" id="new-pass" placeholder="Nueva contraseña">
            <button class="btn" onclick="actualizarPerfil()">Guardar Nueva Clave</button>
            <button class="btn" style="background:none; margin-top:10px; color: var(--text-dim);" onclick="togglePerfil(false)">Cerrar</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://cmqgzwgqvpxuzmivxjcp.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcWd6d2dxdnB4dXptaXZ4amNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDk0NzQsImV4cCI6MjA5MDEyNTQ3NH0.yxukU3-y26DNLdCfEymPNgUSGmHorhuQNPng_fEkWOo";
        
        const db = supabase.createClient(SB_URL, SB_KEY);
        let mode = 'login';
        let currentUser = null;

        function setMode(m) {
            mode = m;
            document.getElementById('t-login').classList.toggle('active', m === 'login');
            document.getElementById('t-reg').classList.toggle('active', m === 'reg');
            document.getElementById('mainBtn').innerText = m === 'login' ? 'ENTRAR AL SISTEMA' : 'CREAR MI CUENTA';
        }

        document.getElementById('postInput').addEventListener('input', e => {
            document.getElementById('charCount').innerText = `${e.target.value.length} / 280`;
        });

        async function execAuth() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const status = document.getElementById('status');
            if (!u || !p) return status.innerHTML = "⚠️ Escribe usuario y clave";

            if (mode === 'reg') {
                status.innerHTML = "🔄 Creando cuenta...";
                const { error } = await db.from('usuarios').insert([{ username: u, password: p }]);
                if (error) status.innerHTML = "❌ " + error.message;
                else { status.innerHTML = "✅ ¡Listo! Ahora inicia sesión."; setMode('login'); }
            } else {
                status.innerHTML = "🔄 Conectando...";
                const { data, error } = await db.from('usuarios').select('*');
                if (error) return status.innerHTML = "❌ Error de API";
                const userMatch = data.find(f => f.username.toLowerCase() === u.toLowerCase() && f.password === p);
                if (userMatch) iniciarApp(userMatch.username);
                else status.innerHTML = "❌ Credenciales inválidas";
            }
        }

        function iniciarApp(username) {
            currentUser = username;
            localStorage.setItem('nexus_user', username);
            document.getElementById('auth-screen').style.display = "none";
            document.getElementById('main-app').style.display = "block";
            document.getElementById('welcome-title').innerText = "NEXUS // " + username.toUpperCase();
            document.getElementById('header-avatar').innerText = username.charAt(0).toUpperCase();
            cargarTodo();
            conectarCanalesRealtime();
        }

        // --- FUNCIONES DE PERFIL (NUEVAS) ---
        function togglePerfil(show) {
            const modal = document.getElementById('profile-modal');
            modal.style.display = show ? 'flex' : 'none';
            if(show) {
                document.getElementById('prof-name').innerText = currentUser;
                document.getElementById('prof-char').innerText = currentUser.charAt(0).toUpperCase();
            }
        }

        async function actualizarPerfil() {
            const newPass = document.getElementById('new-pass').value.trim();
            if(!newPass) return alert("Escribe la nueva contraseña");
            const { error } = await db.from('usuarios').update({ password: newPass }).eq('username', currentUser);
            if(error) alert("Error: " + error.message);
            else { alert("✅ Contraseña actualizada correctamente"); togglePerfil(false); }
        }

        async function cargarTodo() {
            const { data, error } = await db.from('posts').select('*').order('created_at', { ascending: false });
            if (error) return console.error("Error cargando feed");
            const container = document.getElementById('feed-container');
            container.innerHTML = "";
            data.forEach(post => renderizarPost(post));
        }

        async function publicarPost() {
            const text = document.getElementById('postInput').value.trim();
            if (!text) return;
            const btn = document.getElementById('btnPublicar');
            btn.disabled = true;
            const { error } = await db.from('posts').insert([{ autor: currentUser, texto: text, likes: 0 }]);
            if (error) alert("Error al enviar: " + error.message);
            else {
                document.getElementById('postInput').value = "";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            btn.disabled = false;
        }

        async function darLike(postId, currentLikes, btn) {
            btn.classList.toggle('active-like');
            const { error } = await db.from('posts').update({ likes: currentLikes + 1 }).eq('id', postId);
        }

        async function eliminarPost(postId) {
            if(!confirm("¿Borrar este mensaje?")) return;
            const { error } = await db.from('posts').delete().eq('id', postId);
        }

        function conectarCanalesRealtime() {
            db.channel('nexus_global')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, (payload) => {
                const { eventType, new: newRow, old: oldRow } = payload;
                if (eventType === 'INSERT') renderizarPost(newRow, true);
                else if (eventType === 'UPDATE') {
                    const el = document.getElementById(`post-${newRow.id}`);
                    if (el) el.querySelector('.like-count').innerText = newRow.likes;
                } 
                else if (eventType === 'DELETE') {
                    const el = document.getElementById(`post-${oldRow.id}`);
                    if (el) el.remove();
                }
            })
            .subscribe((status) => {
                document.getElementById('online-indicator').style.background = status === 'SUBSCRIBED' ? '#10b981' : '#ef4444';
            });
        }

        function renderizarPost(post, alInicio = false) {
            const container = document.getElementById('feed-container');
            if (document.getElementById(`post-${post.id}`)) return;
            const fecha = new Date(post.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const esMio = post.autor === currentUser;
            const postHTML = `
                <div class="feed-item" id="post-${post.id}">
                    ${esMio ? `<button class="delete-btn" onclick="eliminarPost(${post.id})"><i class="fas fa-trash"></i></button>` : ''}
                    <div class="user-meta">
                        <div class="avatar">${post.autor.charAt(0).toUpperCase()}</div>
                        <div>
                            <p style="font-weight:600">${post.autor}</p>
                            <p style="font-size:0.75rem; color: var(--text-dim)">${fecha}</p>
                        </div>
                    </div>
                    <div class="post-body">${post.texto}</div>
                    <div class="post-actions">
                        <button class="action-btn" onclick="darLike(${post.id}, ${post.likes}, this)">
                            <i class="far fa-heart"></i> <span class="like-count">${post.likes || 0}</span>
                        </button>
                        <button class="action-btn"><i class="far fa-comment"></i> Comentar</button>
                    </div>
                </div>`;
            if (alInicio) container.insertAdjacentHTML('afterbegin', postHTML);
            else container.insertAdjacentHTML('beforeend', postHTML);
        }

        function logout() { localStorage.removeItem('nexus_user'); location.reload(); }
        const savedSession = localStorage.getItem('nexus_user');
        if (savedSession) iniciarApp(savedSession);
    </script>
</body>
</html>
