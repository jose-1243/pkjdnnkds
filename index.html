<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA | PANEL DE CONTROL PREMIUM</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #22d3ee;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* FONDO ANIMADO DE GRADIENTES */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, #1e1b4b 0%, #0f172a 100%);
        }

        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.2;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(50%, 50%); }
        }

        /* --- PANTALLA DE ENTRADA (MODERNA) --- */
        #auth-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-box {
            position: relative;
            margin: 20px 0;
        }

        .input-box input {
            width: 100%;
            padding: 15px 45px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-box input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }

        .input-box i { position: absolute; left: 15px; top: 18px; color: var(--accent); }

        .btn-glow {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-glow:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); }

        /* --- DASHBOARD (PANTALLA PRINCIPAL) --- */
        #dashboard-section {
            display: none;
            padding: 40px;
            max-width: 1200px;
            margin: auto;
            opacity: 0;
            transform: translateY(30px);
            transition: 1s ease;
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-box {
            width: 60px; height: 60px;
            border-radius: 15px;
            background: rgba(99, 102, 241, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: var(--accent);
        }

        /* TABLA MODERNA */
        .table-container {
            background: var(--glass);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 30px;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; opacity: 0.6; font-weight: 400; font-size: 14px; }
        td { padding: 20px 15px; border-top: 1px solid var(--glass-border); }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(34, 211, 238, 0.1);
            color: var(--accent);
        }

        .action-btn {
            background: none; border: none; color: #ff4444; cursor: pointer; font-size: 18px;
            transition: 0.3s;
        }
        .action-btn:hover { transform: scale(1.2); }

        /* MODAL / FORM */
        .add-user-form {
            background: var(--glass);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .form-group { flex: 1; }
        .form-group label { font-size: 12px; margin-bottom: 8px; display: block; opacity: 0.7; }
        .form-group input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border); border-radius: 10px; color: white;
        }

        /* NOTIFICACIONES */
        #toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 15px 30px; border-radius: 12px;
            background: var(--primary); color: white;
            transform: translateY(100px); transition: 0.5s; z-index: 1001;
        }

    </style>
</head>
<body>

    <div class="bg-animate">
        <div class="blob"></div>
    </div>

    <section id="auth-section">
        <div class="glass-card">
            <lottie-player src="https://assets1.lottiefiles.com/packages/lf20_myejioos.json" background="transparent" speed="1" style="width: 150px; height: 150px; margin: auto;" loop autoplay></lottie-player>
            <h2 style="margin-bottom: 10px;">Lumina OS</h2>
            <p style="font-size: 14px; opacity: 0.6; margin-bottom: 30px;">Ingresa tus credenciales para continuar</p>
            
            <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="text" id="userIn" placeholder="Usuario">
            </div>
            <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" id="passIn" placeholder="Contraseña">
            </div>
            
            <button class="btn-glow" onclick="iniciarProtocolo()">Acceder al Sistema</button>
            <p id="error-msg" style="color: #ff4444; font-size: 12px; margin-top: 15px;"></p>
        </div>
    </section>

    <section id="dashboard-section">
        <div class="nav-header">
            <div>
                <h1 id="welcome-text">Hola, Sergio</h1>
                <p style="opacity: 0.6; font-size: 14px;">Hoy es <span id="fecha-actual"></span></p>
            </div>
            <button class="btn-glow" style="width: auto; padding: 10px 25px;" onclick="salir()">Cerrar Sesión</button>
        </div>

        <div class="grid-stats">
            <div class="stat-card">
                <div class="icon-box"><i class="fas fa-users"></i></div>
                <div>
                    <p style="opacity: 0.6; font-size: 12px;">Usuarios Totales</p>
                    <h2 id="count-users">0</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon-box"><i class="fas fa-database"></i></div>
                <div>
                    <p style="opacity: 0.6; font-size: 12px;">Estado DB</p>
                    <h2 style="color: var(--accent);">Activo</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon-box"><i class="fas fa-shield-alt"></i></div>
                <div>
                    <p style="opacity: 0.6; font-size: 12px;">Seguridad</p>
                    <h2 style="color: #4ade80;">SSL 256</h2>
                </div>
            </div>
        </div>

        <div class="add-user-form">
            <div class="form-group">
                <label>Nombre de Usuario</label>
                <input type="text" id="newUserName" placeholder="Ej: Juan Perez">
            </div>
            <div class="form-group">
                <label>Clave de Acceso</label>
                <input type="text" id="newUserPass" placeholder="Ej: 1234abc">
            </div>
            <button class="btn-glow" style="width: 200px;" onclick="guardarUsuario()">Añadir Registro</button>
        </div>

        <div class="table-container">
            <h3>Registros en Tiempo Real</h3>
            <table id="userTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>USUARIO</th>
                        <th>CONTRASEÑA</th>
                        <th>ESTADO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </section>

    <div id="toast">Notificación de sistema</div>

    <script>
        const SB_URL = "https://cmqgzwgqvpxuzmivxjcp.supabase.co";
        const SB_KEY = "sb_publishable_jM1_oVJyaoB_03tMbw9m8w_69_ODcVr";
        const db = supabase.createClient(SB_URL, SB_KEY);

        // FECHA ACTUAL
        document.getElementById('fecha-actual').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.transform = "translateY(0)";
            setTimeout(() => t.style.transform = "translateY(100px)", 3000);
        }

        async function iniciarProtocolo() {
            const u = document.getElementById('userIn').value.trim().toLowerCase();
            const p = document.getElementById('passIn').value.trim();

            const { data, error } = await db.from('usuarios').select('*');
            if (error) return alert("Error de red");

            const found = data.find(f => f.username.toLowerCase() === u && f.password === p);

            if (found) {
                document.getElementById('auth-section').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('auth-section').style.display = "none";
                    document.getElementById('dashboard-section').style.display = "block";
                    setTimeout(() => document.getElementById('dashboard-section').style.opacity = "1", 100);
                    renderTable();
                }, 800);
                localStorage.setItem('user_session', u);
            } else {
                document.getElementById('error-msg').innerText = "Credenciales incorrectas. Intenta con x/x";
            }
        }

        async function renderTable() {
            const { data, error } = await db.from('usuarios').select('*').order('id', { ascending: false });
            if (error) return;

            document.getElementById('count-users').innerText = data.length;
            const body = document.getElementById('tableBody');
            body.innerHTML = "";

            data.forEach(f => {
                body.innerHTML += `
                    <tr>
                        <td>#${f.id}</td>
                        <td style="font-weight:600">${f.username}</td>
                        <td style="font-family: monospace; opacity: 0.7;">${f.password}</td>
                        <td><span class="badge">Online</span></td>
                        <td><button class="action-btn" onclick="borrarRegistro(${f.id})"><i class="fas fa-trash-alt"></i></button></td>
                    </tr>
                `;
            });
        }

        async function guardarUsuario() {
            const u = document.getElementById('newUserName').value.trim();
            const p = document.getElementById('newUserPass').value.trim();

            if (!u || !p) return showToast("Por favor llena ambos campos");

            const { error } = await db.from('usuarios').insert([{ username: u, password: p }]);
            if (error) return showToast("Fallo al guardar");

            showToast("Usuario guardado con éxito");
            renderTable();
            document.getElementById('newUserName').value = "";
            document.getElementById('newUserPass').value = "";
        }

        async function borrarRegistro(id) {
            if (!confirm("¿Borrar este usuario de la base de datos?")) return;
            const { error } = await db.from('usuarios').delete().eq('id', id);
            if (error) return showToast("Error al eliminar");
            showToast("Registro borrado");
            renderTable();
        }

        function salir() {
            localStorage.removeItem('user_session');
            location.reload();
        }

        // AUTO-LOGIN
        if (localStorage.getItem('user_session')) {
            document.getElementById('auth-section').style.display = "none";
            document.getElementById('dashboard-section').style.display = "block";
            document.getElementById('dashboard-section').style.opacity = "1";
            renderTable();
        }
    </script>
</body>
</html>
