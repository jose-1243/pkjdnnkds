<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DEBUGGER V3 | ERROR DE URL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; line-height: 1.5; }
        .box { border: 1px dashed #0f0; padding: 15px; margin-bottom: 20px; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; padding: 8px; width: 200px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #console { border-top: 2px solid #333; margin-top: 20px; padding-top: 10px; }
        .error-msg { color: #ff4444; background: rgba(255,0,0,0.1); padding: 5px; border-left: 3px solid red; margin: 5px 0; }
        .ok-msg { color: #00ff88; }
    </style>
</head>
<body>

    <div class="box">
        <h3>SISTEMA DE PRUEBA DE CONEXIÓN</h3>
        USER: <input type="text" id="u" placeholder="user..."><br><br>
        PASS: <input type="password" id="p" placeholder="pass..."><br><br>
        <button onclick="runDebug()">INICIAR ESCANEO FORZADO</button>
    </div>

    <div id="console">>> Terminal de diagnóstico lista.</div>

    <script>
        // URL Y KEY LIMPIAS (Sin espacios accidentales)
        const URL_LIMPID = "https://cmqgzwgqvpxuzmivxjcp.supabase.co".trim();
        const KEY_LIMPID = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcWd6d2dxdnB4dXptaXZ4amNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDk0NzQsImV4cCI6MjA5MDEyNTQ3NH0.yxukU3-y26DNLdCfEymPNgUSGmHorhuQNPng_fEkWOo".trim();
        
        let client = null;

        // Intentar inicializar con manejo de errores
        try {
            client = supabase.createClient(URL_LIMPID, KEY_LIMPID);
            console.log("Cliente inicializado correctamente.");
        } catch (e) {
            document.getElementById('console').innerHTML = `<div class="error-msg">ERROR INICIAL: ${e.message}</div>`;
        }

        function print(msg, isError = false) {
            const c = document.getElementById('console');
            const div = document.createElement('div');
            div.className = isError ? "error-msg" : "ok-msg";
            div.innerHTML = `> ${msg}`;
            c.appendChild(div);
        }

        async function runDebug() {
            if (!client) {
                print("No se puede ejecutar: El cliente de Supabase no cargó por error de URL.", true);
                return;
            }

            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            document.getElementById('console').innerHTML = "<b>Iniciando secuencia...</b>";

            print("Verificando existencia de tabla 'usuarios'...");

            // PASO 1: Probar si la tabla existe
            const { data, error } = await client
                .from('usuarios')
                .select('*')
                .limit(1);

            if (error) {
                print(`ERROR DETECTADO: ${error.message}`, true);
                print(`CÓDIGO: ${error.code}`, true);
                
                if (error.code === "42P01") print("SUGERENCIA: La tabla 'usuarios' no existe en tu DB.");
                if (error.code === "42501") print("SUGERENCIA: El RLS está bloqueando la lectura. Desactívalo en el SQL Editor.");
                return;
            }

            print("Tabla detectada con éxito.", false);

            // PASO 2: Login
            print(`Buscando coincidencias para "${user}"...`);
            const { data: logData, error: logErr } = await client
                .from('usuarios')
                .select('*')
                .eq('username', user)
                .eq('password', pass);

            if (logData && logData.length > 0) {
                print("¡ACCESO CONCEDIDO! Usuario verificado.", false);
                print(`ID: ${logData[0].id} | User: ${logData[0].username}`);
            } else {
                print("ERROR: Credenciales no encontradas en la tabla.", true);
                print("Revisa si escribiste bien el usuario o si hay espacios extras en Supabase.");
            }
        }
    </script>
</body>
</html>
