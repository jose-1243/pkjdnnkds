<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS SOCIAL | ACCESO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7c3aed; --bg: #0b0f1a; --card: #161b2c; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tabs { display: flex; margin-bottom: 25px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; border: none; background: none; color: white; cursor: pointer; border-radius: 8px; font-weight: 600; }
        .tab.active { background: var(--primary); }
        input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); }
        .btn {
            width: 100%; padding: 14px; background: var(--primary);
            border: none; border-radius: 10px; color: white;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        #status { margin-top: 15px; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

<div class="auth-card">
    <h1 style="margin:0 0 10px 0; text-align:center;">Nexus Social</h1>
    <p style="text-align:center; opacity:0.6; font-size:14px; margin-bottom:25px;">Fase 1: Autenticación de Nodo</p>
    
    <div class="tabs">
        <button id="t-login" class="tab active" onclick="setMode('login')">Ingresar</button>
        <button id="t-reg" class="tab" onclick="setMode('reg')">Registrarse</button>
    </div>

    <input type="text" id="user" placeholder="Nombre de usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn" id="mainBtn" onclick="execAuth()">ENTRAR AL NEXO</button>
    
    <div id="status"></div>
</div>

<script>
    const SB_URL = "https://cmqgzwgqvpxuzmivxjcp.supabase.co";
    const SB_KEY = "sb_publishable_jM1_oVJyaoB_03tMbw9m8w_69_ODcVr";
    const db = supabase.createClient(SB_URL, SB_KEY);

    let mode = 'login';

    function setMode(m) {
        mode = m;
        document.getElementById('t-login').classList.toggle('active', m === 'login');
        document.getElementById('t-reg').classList.toggle('active', m === 'reg');
        document.getElementById('mainBtn').innerText = m === 'login' ? 'ENTRAR AL NEXO' : 'CREAR MI CUENTA';
    }

    async function execAuth() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        const status = document.getElementById('status');

        if (!u || !p) return status.innerHTML = "⚠️ Llena los campos";
        status.innerHTML = "🛰️ Procesando...";

        if (mode === 'reg') {
            // REGISTRO REAL EN SUPABASE
            const { error } = await db.from('usuarios').insert([{ username: u, password: p }]);
            if (error) {
                status.innerHTML = "❌ Error: " + error.message;
            } else {
                status.innerHTML = "✅ ¡Cuenta creada! Ya puedes entrar.";
                setMode('login');
            }
        } else {
            // LOGIN REAL
            const { data, error } = await db.from('usuarios').select('*');
            if (error) return status.innerHTML = "❌ Fallo de conexión";
            
            const match = data.find(f => f.username.toLowerCase() === u.toLowerCase() && f.password === p);
            if (match) {
                status.innerHTML = "🔓 Acceso concedido...";
                localStorage.setItem('nexus_user', u);
                // Aquí en la Fase 2 pondremos la redirección al feed
                alert("¡Bienvenido " + u + "! Fase 1 completada.");
            } else {
                status.innerHTML = "❌ Datos incorrectos";
            }
        }
    }
</script>

</body>
</html>
