<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL CENTRAL | PROYECTO SERGIO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050505;
            --panel-bg: #0d0d0d;
            --border-color: #00ff41;
            --error-red: #ff3131;
            --warning-yellow: #ffcc00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- PANTALLA DE LOGIN (OVERLAY) --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--dark-bg);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .login-box {
            width: 380px;
            padding: 40px;
            border: 2px solid var(--border-color);
            background: #000;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2);
            text-align: center;
        }

        .login-box h1 { font-size: 1.5rem; margin-bottom: 25px; letter-spacing: 3px; }

        /* --- INPUTS Y BOTONES --- */
        .field { margin-bottom: 20px; text-align: left; }
        label { font-size: 10px; display: block; margin-bottom: 5px; opacity: 0.8; }
        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid var(--border-color);
            color: var(--neon-green);
            outline: none;
            font-family: inherit;
        }

        .btn-core {
            width: 100%;
            padding: 15px;
            background: var(--neon-green);
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-core:hover { background: #fff; box-shadow: 0 0 15px #fff; }

        /* --- ESTRUCTURA DEL DASHBOARD --- */
        #admin-panel {
            display: none; /* Se activa tras login */
            flex: 1;
            display: grid;
            grid-template-columns: 240px 1fr;
            grid-template-rows: 60px 1fr 180px;
        }

        header {
            grid-column: 1 / 3;
            background: #000;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 25px;
            justify-content: space-between;
        }

        aside {
            background: #080808;
            border-right: 1px solid #1a1a1a;
            padding: 20px;
        }

        .nav-item {
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item:hover { border-color: var(--neon-green); background: #111; }
        .nav-item.active { background: var(--neon-green); color: #000; font-weight: bold; }

        main {
            background: #000;
            padding: 30px;
            overflow-y: auto;
        }

        /* --- TABLAS Y CARDS --- */
        .card {
            background: #0f0f0f;
            border: 1px solid #222;
            padding: 20px;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
        }

        th { color: #fff; background: #151515; }

        .btn-sm {
            padding: 5px 10px;
            font-size: 10px;
            background: var(--error-red);
            color: #fff;
            border: none;
            cursor: pointer;
        }

        /* --- TERMINAL (FOOTER) --- */
        footer {
            grid-column: 1 / 3;
            background: #000;
            border-top: 1px solid #1a1a1a;
            padding: 15px;
            font-size: 11px;
            overflow-y: auto;
            color: #008f11;
        }

        .log-entry { margin-bottom: 4px; }
        .log-time { color: #555; margin-right: 8px; }

        /* --- ANIMACIONES --- */
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-green); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1>SISTEMA_LOGIN</h1>
            <div class="field">
                <label>IDENTIFICACIÓN DE USUARIO</label>
                <input type="text" id="userInput" placeholder="x / admin">
            </div>
            <div class="field">
                <label>CÓDIGO DE ACCESO</label>
                <input type="password" id="passInput" placeholder="x / password123">
            </div>
            <button class="btn-core" onclick="authProtocol()">Sincronizar</button>
            <p id="auth-status" style="margin-top:20px; font-size:11px; color:var(--error-red)"></p>
        </div>
    </div>

    <div id="admin-panel" style="display: none;">
        <header>
            <div style="display:flex; align-items:center;">
                <div style="width:10px; height:10px; background:var(--neon-green); border-radius:50%; margin-right:10px;" class="blink"></div>
                <span>ESTADO: <span style="color:#fff">EN LÍNEA</span> | USUARIO: <span id="current-user" style="color:#fff">-</span></span>
            </div>
            <button onclick="logout()" style="background:none; border:1px solid #333; color:#fff; padding:5px 15px; cursor:pointer;">CERRAR_SESIÓN</button>
        </header>

        <aside>
            <h4 style="font-size:12px; margin-bottom:20px; color:#555;">MÓDULOS_SISTEMA</h4>
            <div class="nav-item active">💾 GESTIÓN_DB</div>
            <div class="nav-item">📡 TRÁFICO_RED</div>
            <div class="nav-item">🛠️ AJUSTES</div>
        </aside>

        <main>
            <div class="card">
                <h3>REGISTRO DE USUARIOS (SUPABASE)</h3>
                <p style="font-size:12px; color:#666; margin-bottom:20px;">Manipulación directa de la tabla `usuarios` vía API Publishable.</p>
                
                <div style="display:flex; gap:20px;">
                    <div style="flex:1; border:1px solid #222; padding:15px;">
                        <h4 style="font-size:12px; margin-bottom:10px;">AÑADIR NUEVO REGISTRO</h4>
                        <input type="text" id="addU" placeholder="Usuario" style="margin-bottom:10px; font-size:12px;">
                        <input type="text" id="addP" placeholder="Password" style="margin-bottom:10px; font-size:12px;">
                        <button class="btn-core" style="padding:8px;" onclick="createNewUser()">Insertar</button>
                    </div>

                    <div style="flex:2;">
                        <table id="mainTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>USERNAME</th>
                                    <th>PASSWORD</th>
                                    <th>ACCIONES</th>
                                </tr>
                            </thead>
                            <tbody id="tableContent">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer id="terminal">
            <div class="log-entry"><span class="log-time">[00:00:00]</span> Esperando órdenes...</div>
        </footer>
    </div>

    <script>
        // --- CONFIGURACIÓN DE NODO (Extraída de tus capturas) ---
        const SB_URL = "https://cmqgzwgqvpxuzmivxjcp.supabase.co";
        const SB_KEY = "sb_publishable_jM1_oVJyaoB_03tMbw9m8w_69_ODcVr"; // Tu Publishable Key

        let client;
        const terminal = document.getElementById('terminal');

        function writeLog(msg, type = 'info') {
            const now = new Date().toLocaleTimeString();
            let color = "#008f11";
            if (type === 'error') color = "var(--error-red)";
            if (type === 'warn') color = "var(--warning-yellow)";
            
            terminal.innerHTML += `<div class="log-entry"><span class="log-time">[${now}]</span> <span style="color:${color}">${msg}</span></div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Inicialización
        window.onload = () => {
            try {
                client = supabase.createClient(SB_URL, SB_KEY);
                writeLog("Conexión establecida con el nodo cmqgzwg...");
                checkSession();
            } catch (e) {
                writeLog("Fallo crítico al cargar Supabase: " + e.message, 'error');
            }
        };

        // PROTOCOLO DE AUTENTICACIÓN
        async function authProtocol() {
            const u = document.getElementById('userInput').value.trim().toLowerCase();
            const p = document.getElementById('passInput').value.trim();
            const status = document.getElementById('auth-status');

            writeLog(`Intento de acceso: ${u}...`);

            try {
                // Pedimos todos los usuarios para comparar localmente (más robusto)
                const { data, error } = await client.from('usuarios').select('*');

                if (error) throw error;

                writeLog(`Registros encontrados en DB: ${data.length}`);

                const user = data.find(f => f.username.toLowerCase() === u && f.password === p);

                if (user) {
                    writeLog(`Acceso exitoso. Bienvenido ${u}`, 'warn');
                    localStorage.setItem('sergio_session', u);
                    launchDashboard(u);
                } else {
                    status.innerHTML = "ACCESO DENEGADO: CREDENCIALES ERRÓNEAS";
                    writeLog(`Fallo de login para usuario: ${u}`, 'error');
                }

            } catch (e) {
                writeLog("Error de red: " + e.message, 'error');
            }
        }

        function launchDashboard(username) {
            document.getElementById('login-overlay').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = "none";
                document.getElementById('admin-panel').style.display = "grid";
                document.getElementById('current-user').innerText = username.toUpperCase();
                refreshTable();
            }, 800);
        }

        // GESTIÓN DE TABLA (CRUD)
        async function refreshTable() {
            writeLog("Sincronizando tabla de usuarios...");
            const tbody = document.getElementById('tableContent');
            tbody.innerHTML = "<tr><td colspan='4'>Cargando datos...</td></tr>";

            const { data, error } = await client.from('usuarios').select('*').order('id', { ascending: true });

            if (error) {
                writeLog("Error al sincronizar: " + error.message, 'error');
                return;
            }

            tbody.innerHTML = "";
            data.forEach(row => {
                tbody.innerHTML += `
                    <tr>
                        <td>${row.id}</td>
                        <td style="color:#fff">${row.username}</td>
                        <td>${row.password}</td>
                        <td><button class="btn-sm" onclick="deleteUser(${row.id})">ELIMINAR</button></td>
                    </tr>
                `;
            });
        }

        async function createNewUser() {
            const u = document.getElementById('addU').value.trim();
            const p = document.getElementById('addP').value.trim();

            if (!u || !p) return writeLog("Campos vacíos. Abortando inserción.", 'warn');

            writeLog(`Insertando usuario: ${u}...`);
            const { error } = await client.from('usuarios').insert([{ username: u, password: p }]);

            if (error) {
                writeLog("Error al crear: " + error.message, 'error');
            } else {
                writeLog("Registro insertado correctamente.", 'warn');
                document.getElementById('addU').value = "";
                document.getElementById('addP').value = "";
                refreshTable();
            }
        }

        async function deleteUser(id) {
            if (!confirm(`¿Eliminar registro ID ${id}?`)) return;

            writeLog(`Borrando registro ID ${id}...`);
            const { error } = await client.from('usuarios').delete().eq('id', id);

            if (error) {
                writeLog("Error al borrar: " + error.message, 'error');
            } else {
                writeLog(`ID ${id} eliminado del sistema.`, 'warn');
                refreshTable();
            }
        }

        function checkSession() {
            const s = localStorage.getItem('sergio_session');
            if (s) launchDashboard(s);
        }

        function logout() {
            localStorage.removeItem('sergio_session');
            location.reload();
        }
    </script>
</body>
</html>
