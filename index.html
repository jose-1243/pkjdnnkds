<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA SERGIO | CORRECCIÓN CRÍTICA</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 30px; }
        .box { border: 2px solid #0f0; padding: 20px; max-width: 350px; margin: auto; text-align: center; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; width: 90%; padding: 10px; margin: 10px 0; }
        button { width: 95%; padding: 12px; background: #0f0; color: #000; font-weight: bold; cursor: pointer; border: none; }
        #monitor { margin-top: 20px; font-size: 11px; text-align: left; border-top: 1px solid #333; padding-top: 10px; }
        .err { color: #ff4444; }
    </style>
</head>
<body>

    <div class="box">
        <h3>ACCESO NIVEL 1</h3>
        <input type="text" id="u" placeholder="USUARIO">
        <input type="password" id="p" placeholder="CONTRASEÑA">
        <button id="btnEntrar">CONECTAR</button>
        
        <div id="monitor">>> Esperando inicialización...</div>
    </div>

    <script>
        // Variables de conexión
        const URL_DB = "https://cmqgzwgqvpxuzmivxjcp.supabase.co";
        const KEY_DB = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcWd6d2dxdnB4dXptaXZ4amNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDk0NzQsImV4cCI6MjA5MDEyNTQ3NH0.yxukU3-y26DNLdCfEymPNgUSGmHorhuQNPng_fEkWOo";
        
        let client;
        const monitor = document.getElementById('monitor');

        // Función para inicializar con seguridad
        window.onload = function() {
            try {
                if (typeof supabase === 'undefined') {
                    monitor.innerHTML = "<span class='err'>>> ERROR: No se pudo cargar la librería Supabase. Revisa tu conexión a Internet.</span>";
                } else {
                    client = supabase.createClient(URL_BASE = URL_DB, KEY_BASE = KEY_DB);
                    monitor.innerHTML = ">> Librería cargada. Sistema listo.";
                }
            } catch (e) {
                monitor.innerHTML = "<span class='err'>>> ERROR INICIAL: " + e.message + "</span>";
            }
        };

        // Evento del botón
        document.getElementById('btnEntrar').onclick = async function() {
            const userIn = document.getElementById('u').value.trim();
            const passIn = document.getElementById('p').value.trim();

            if (!client) {
                alert("El sistema no está conectado.");
                return;
            }

            monitor.innerHTML = ">> Consultando...";

            const { data, error } = await client.from('usuarios').select('*');

            if (error) {
                monitor.innerHTML = "<span class='err'>>> ERROR DB: " + error.message + "</span>";
                return;
            }

            let loginOk = false;
            monitor.innerHTML = ""; // Limpiar

            data.forEach(fila => {
                if (fila.username === userIn && fila.password === passIn) {
                    loginOk = true;
                    monitor.innerHTML += ">> [OK] Coincidencia con " + fila.username + "<br>";
                } else {
                    monitor.innerHTML += ">> [NO] Comparando con " + fila.username + "<br>";
                }
            });

            if (loginOk) alert("¡BIENVENIDO, SERGIO!");
            else monitor.innerHTML += "<span class='err'>>> CREDENCIALES NO VÁLIDAS.</span>";
        };
    </script>
</body>
</html>
