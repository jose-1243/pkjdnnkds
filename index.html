<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS OS | THE ULTIMATE SOCIAL PLATFORM</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* =========================================
           SISTEMA DE DISEÑO NEXUS QUANTUM
           ========================================= */
        :root {
            /* Palette Core */
            --primary: #8b5cf6;
            --primary-rgb: 139, 92, 246;
            --primary-dark: #6d28d9;
            --secondary: #ec4899;
            --accent: #06b6d4;
            
            /* Dark Mode Engine */
            --bg-deep: #030712;
            --bg-main: #0b0f1a;
            --card-bg: rgba(22, 27, 44, 0.7);
            --card-hover: rgba(31, 41, 55, 0.9);
            
            /* Borders & Glass */
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shine: rgba(255, 255, 255, 0.03);
            --border-radius-xl: 32px;
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            
            /* Typography */
            --text-main: #f9fafb;
            --text-dim: #94a3b8;
            --text-muted: #64748b;
            
            /* Status */
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            
            /* Elevation */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Reset Maestro */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(at 0% 0%, rgba(var(--primary-rgb), 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0, transparent 50%);
            color: var(--text-main);
            line-height: 1.5;
            overflow: hidden; /* Controlado por el motor de scroll interno */
            height: 100vh;
            width: 100vw;
        }

        /* Custom Scrollbar Engine */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { 
            background: var(--glass-border); 
            border-radius: 10px;
            border: 2px solid var(--bg-deep);
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* =========================================
           COMPONENTES ATÓMICOS
           ========================================= */

        /* Inputs de Alta Gama */
        .nexus-input-group { position: relative; margin-bottom: 20px; width: 100%; }
        
        .nexus-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-md);
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nexus-input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(var(--primary-rgb), 0.15);
            transform: translateY(-1px);
        }

        /* Botones Pro */
        .nexus-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: var(--border-radius-md);
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 10px 20px -5px rgba(var(--primary-rgb), 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px -5px rgba(var(--primary-rgb), 0.6);
        }

        /* =========================================
           LAYOUT: AUTH ENGINE
           ========================================= */
        #auth-engine {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            background: var(--bg-deep);
        }

        .auth-portal {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-xl);
            padding: 50px;
            box-shadow: var(--shadow-xl);
            text-align: center;
            position: relative;
        }

        .auth-logo {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom right, #fff, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* =========================================
           LAYOUT: MAIN APPLICATION
           ========================================= */
        #nexus-app-root {
            display: none; /* Se activa vía JS */
            height: 100vh;
            grid-template-columns: 280px 1fr 350px;
            gap: 0;
            opacity: 0;
        }

        /* Sidebar Navigation */
        .nexus-nav {
            background: rgba(3, 7, 18, 0.5);
            border-right: 1px solid var(--glass-border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        .nav-brand {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 50px;
            padding-left: 15px;
            color: var(--primary);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px 20px;
            border-radius: var(--border-radius-md);
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 8px;
            transition: all 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
        }

        .nav-link i { font-size: 1.25rem; }

        /* Main Feed View */
        .nexus-viewport {
            height: 100vh;
            overflow-y: scroll;
            padding: 0 40px;
            scroll-behavior: smooth;
        }

        .viewport-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11, 15, 26, 0.8);
            backdrop-filter: blur(15px);
            padding: 25px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
        }

        /* Feed Cards */
        .nexus-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            padding: 30px;
            margin-bottom: 25px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nexus-card:hover {
            border-color: rgba(var(--primary-rgb), 0.3);
            background: var(--card-hover);
        }

        /* Avatar Engine */
        .avatar-ring {
            position: relative;
            padding: 3px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border-radius: 18px;
            display: inline-block;
        }

        .avatar-box {
            width: 50px; height: 50px;
            background: var(--bg-main);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
        }

        /* Right Sidebar Widgets */
        .nexus-widgets {
            border-left: 1px solid var(--glass-border);
            padding: 40px 30px;
            background: rgba(3, 7, 18, 0.3);
        }

        .widget-box {
            background: var(--card-bg);
            border-radius: var(--border-radius-md);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        /* =========================================
           MODAL SYSTEM & TOASTS
           ========================================= */
        .nexus-toast-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 10000;
        }

        .nexus-toast {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 16px 24px;
            border-radius: var(--border-radius-md);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow-lg);
            animation: slideInLeft 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideInLeft {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

    </style>
</head>
<body>

    <div id="toast-master" class="nexus-toast-container"></div>

    <div id="auth-engine">
        <div class="auth-portal">
            <div class="auth-logo">NEXUS</div>
            <p style="color: var(--text-dim); margin-bottom: 40px; font-weight: 500;">Inicia sesión en la red del futuro</p>

                <button onclick="handleAuth('signup')" class="nexus-btn" style="background: rgba(255,255,255,0.05); color: white;">

                <i class="fas fa-circle-notch fa-spin" style="color: var(--primary)"></i>
            </div>
        </div>
    </div>

    <div id="nexus-app-root">
        
        <nav class="nexus-nav">
            <div class="nav-brand">NEXUS.</div>
            
            <a href="#" class="nav-link active" onclick="navTo('feed', this)">
                <i class="fas fa-th-large"></i> Global Feed
            </a>
            <a href="#" class="nav-link" onclick="navTo('explore', this)">
                <i class="fas fa-compass"></i> Explorar
            </a>
            <a href="#" class="nav-link" onclick="navTo('messages', this)">
                <i class="fas fa-comment-alt"></i> Mensajería
            </a>
            <a href="#" class="nav-link" onclick="navTo('profile', this)">
                <i class="fas fa-user-circle"></i> Mi Perfil
            </a>
            <a href="#" class="nav-link" onclick="navTo('security', this)">
                <i class="fas fa-shield-alt"></i> Seguridad
            </a>

            <div style="margin-top: auto;">
                <div class="widget-box" style="padding: 15px; margin-bottom: 25px;">
                    <div style="display:flex; align-items:center; gap:12px">
                        <div class="avatar-ring">
                            <div class="avatar-box" id="current-user-avatar" style="width:35px; height:35px; font-size:0.9rem">S</div>
                        </div>
                        <div style="overflow:hidden">
                            <p id="current-user-name" style="font-weight:700; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Usuario</p>
                            <p style="font-size:0.7rem; color:var(--success)">● Online</p>
                        </div>
                    </div>
                </div>
                <button onclick="systemLogout()" class="nexus-btn" style="width:100%; background:rgba(239, 68, 68, 0.1); color:var(--danger)">
                    DESCONECTAR <i class="fas fa-power-off"></i>
                </button>
            </div>
        </nav>

        <main class="nexus-viewport" id="viewport">
            
            <div id="view-feed" class="view-content">
                <header class="viewport-header">
                    <h1 style="font-weight: 900; letter-spacing: -1.5px; font-size: 2.2rem;">STREAMING <span style="color: var(--primary)">GLOBAL</span></h1>
                </header>

                <div class="nexus-card" style="border-style: dashed; background: rgba(var(--primary-rgb), 0.05);">
                    <textarea id="post-input-main" class="nexus-input" style="min-height: 100px; margin-bottom: 15px; background: transparent; border: none; font-size: 1.2rem;" placeholder="¿Qué estás codificando hoy, Sergio?"></textarea>
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div style="display:flex; gap:15px; color:var(--text-dim)">
                            <i class="fas fa-image" style="cursor:pointer"></i>
                            <i class="fas fa-link" style="cursor:pointer"></i>

                        </div>
                        <button onclick="dispatchPost()" class="nexus-btn btn-primary" id="btn-post" style="padding: 10px 30px;">
                            PUBLICAR <i class="fas fa-paper-plane"></i>

                <div id="feed-render-engine">

            </div>

            <div id="view-profile" class="view-content" style="display:none">

                    <h1 style="font-weight: 900;">AJUSTES DE <span style="color: var(--primary)">PERFIL</span></h1>
                </header>
                
                <div class="nexus-card">
                    <h3 style="margin-bottom: 20px;">Seguridad de la Cuenta</h3>
                    <div class="nexus-input-group">
                        <label style="display:block; margin-bottom:8px; color:var(--text-dim)">Nueva Contraseña</label>
                        <input type="password" id="profile-new-pass" class="nexus-input" placeholder="********">
                    </div>
                    <button onclick="updateSecurity()" class="nexus-btn btn-primary">ACTUALIZAR CREDENCIALES</button>
                </div>
            </div>

        </main>

        <aside class="nexus-widgets">
            <div class="nexus-input-group">
                <i class="fas fa-search" style="position:absolute; left:15px; top:18px; color:var(--text-muted)"></i>
                <input type="text" class="nexus-input" style="padding-left:45px;" placeholder="Buscar en el Nexo...">
            </div>

            <div class="widget-box">
                <h4 style="margin-bottom:15px; color:var(--primary)">TENDENCIAS</h4>
                <div style="display:flex; flex-direction:column; gap:12px">
                    <div style="cursor:pointer">
                        <p style="font-size:0.75rem; color:var(--text-muted)">Desarrollo</p>
                        <p style="font-weight:700">#Python313</p>
                    </div>
                    <div style="cursor:pointer">
                        <p style="font-size:0.75rem; color:var(--text-muted)">Seguridad</p>
                        <p style="font-weight:700">#NetworkStress</p>
                    </div>
                </div>
            </div>

            <div class="widget-box" style="background: linear-gradient(rgba(var(--primary-rgb), 0.1), transparent);">
                <h4 style="margin-bottom:10px;">ESTADÍSTICAS</h4>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                    <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; text-align:center">
                        <p style="font-size:1.2rem; font-weight:800; color:var(--primary)">2.4k</p>
                        <p style="font-size:0.6rem; color:var(--text-dim)">ALCANCE</p>
                    </div>
                    <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; text-align:center">
                        <p style="font-size:1.2rem; font-weight:800; color:var(--accent)">156</p>
                        <p style="font-size:0.6rem; color:var(--text-dim)">POSTS</p>
                    </div>
                </div>
            </div>
        </aside>

    </div>
    <script>
    /* =========================================
       NEXUS CORE CONFIGURATION
       ========================================= */
    const NEXUS_CONFIG = {
        URL: "https://cmqgzwgqvpxuzmivxjcp.supabase.co",
        KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcWd6d2dxdnB4dXptaXZ4amNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDk0NzQsImV4cCI6MjA5MDEyNTQ3NH0.yxukU3-y26DNLdCfEymPNgUSGmHorhuQNPng_fEkWOo",
        TABLE_USERS: 'usuarios',
        TABLE_POSTS: 'posts',
        TABLE_MSG: 'mensajes',
        VERSION: '4.0.2-Stable'
    };

    const db = supabase.createClient(NEXUS_CONFIG.URL, NEXUS_CONFIG.KEY);
    
    // Estado Global de la Aplicación
    let SESSION_USER = null;
    let APP_STATE = {
        isLive: false,
        activeTab: 'feed',
        cache: { posts: [], users: [] },
        lastFetch: null
    };

    /* =========================================
       MOTOR DE AUTENTICACIÓN (BIO-SYNC)
       ========================================= */
    async function handleAuth(type) {
        const u = document.getElementById('user-core').value.trim();
        const p = document.getElementById('pass-core').value.trim();
        const loader = document.getElementById('auth-loader');
        const btn = document.getElementById('btn-login-main');

        if (!u || !p) return pushToast("⚠️ Error: Campos incompletos", "danger");

        loader.style.display = 'block';
        btn.disabled = true;

        try {
            if (type === 'signup') {
                const { error } = await db.from(NEXUS_CONFIG.TABLE_USERS).insert([{ 
                    username: u, 
                    password: p,
                    created_at: new Date().toISOString() 
                }]);
                if (error) throw error;
                pushToast("✅ Registro exitoso. Iniciando...", "success");
            }

            const { data, error } = await db.from(NEXUS_CONFIG.TABLE_USERS).select('*');
            if (error) throw error;

            const user = data.find(x => x.username.toLowerCase() === u.toLowerCase() && x.password === p);
            
            if (user) {
                bootstrapApp(user.username);
            } else {
                pushToast("❌ Acceso denegado: Credenciales inválidas", "danger");
            }
        } catch (err) {
            console.error("Auth Error:", err);
            pushToast(`❌ Error de Sistema: ${err.message}`, "danger");
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }

    function bootstrapApp(username) {
        SESSION_USER = username;
        localStorage.setItem('nexus_session_token', btoa(username));
        
        // Animación de Entrada con GSAP
        gsap.to("#auth-engine", { duration: 0.8, y: -1000, ease: "expo.inOut", onComplete: () => {
            document.getElementById('auth-engine').style.display = 'none';
            const root = document.getElementById('nexus-app-root');
            root.style.display = 'grid';
            gsap.to(root, { duration: 0.5, opacity: 1 });
        }});

        document.getElementById('current-user-name').innerText = username;
        document.getElementById('current-user-avatar').innerText = username.charAt(0).toUpperCase();
        
        initDataPipelines();
    }

    /* =========================================
       SISTEMA DE NAVEGACIÓN DINÁMICA
       ========================================= */
    function navTo(view, element) {
        APP_STATE.activeTab = view;
        
        // UI Reset
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        element.classList.add('active');

        // View Swapping
        document.querySelectorAll('.view-content').forEach(v => v.style.display = 'none');
        const targetView = document.getElementById(`view-${view}`);
        if (targetView) {
            targetView.style.display = 'block';
            gsap.from(targetView, { duration: 0.4, y: 20, opacity: 0 });
        } else {
            pushToast(`🚧 Módulo '${view}' en desarrollo`, "warning");
        }

        if (view === 'profile') syncProfileData();
    }

    /* =========================================
       PIPELINES DE DATOS (FEED & REALTIME)
       ========================================= */
    async function initDataPipelines() {
        await refreshFeed();
        
        // Suscripción Realtime Pro
        db.channel('nexus-live-sync')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: NEXUS_CONFIG.TABLE_POSTS }, payload => {
                injectPost(payload.new, true);
                pushToast(`📢 Nuevo post de ${payload.new.autor}`, "primary");
            })
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: NEXUS_CONFIG.TABLE_POSTS }, payload => {
                const el = document.getElementById(`post-node-${payload.old.id}`);
                if (el) gsap.to(el, { duration: 0.3, scale: 0, opacity: 0, onComplete: () => el.remove() });
            })
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: NEXUS_CONFIG.TABLE_POSTS }, payload => {
                updatePostUI(payload.new);
            })
            .subscribe();
    }

    async function refreshFeed() {
        const container = document.getElementById('feed-render-engine');
        container.innerHTML = '<div style="text-align:center; padding:50px"><i class="fas fa-spinner fa-spin fa-2x"></i></div>';
        
        const { data, error } = await db.from(NEXUS_CONFIG.TABLE_POSTS)
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return pushToast("❌ Error al sincronizar feed", "danger");
        
        container.innerHTML = '';
        data.forEach(post => injectPost(post));
        APP_STATE.cache.posts = data;
    }

    /* =========================================
       SISTEMA DE TOASTS PROFESIONAL
       ========================================= */
    function pushToast(msg, type = 'primary') {
        const container = document.getElementById('toast-master');
        const toast = document.createElement('div');
        toast.className = `nexus-toast toast-${type}`;
        
        const icons = {
            primary: 'fa-info-circle',
            success: 'fa-check-circle',
            warning: 'fa-exclamation-triangle',
            danger: 'fa-times-circle'
        };

        toast.innerHTML = `
            <i class="fas ${icons[type]}" style="color: var(--${type})"></i>
            <span style="font-weight:600; font-size:0.9rem">${msg}</span>
        `;

        container.appendChild(toast);
        
        // Auto-remove con animación
        setTimeout(() => {
            gsap.to(toast, { duration: 0.5, x: 200, opacity: 0, onComplete: () => toast.remove() });
        }, 4000);
    }

    /* =========================================
       SEGURIDAD Y SESIÓN
       ========================================= */
    function systemLogout() {
        localStorage.removeItem('nexus_session_token');
        location.reload();
    }

    // Persistencia de Sesión al Inicio
    window.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('nexus_session_token');
        if (token) {
            try {
                const user = atob(token);
                bootstrapApp(user);
            } catch(e) {
                localStorage.removeItem('nexus_session_token');
            }
        }
    });
/* =========================================
       ENGINE: RENDERIZADO DE POSTS (UI)
       ========================================= */
    function injectPost(post, atTop = false) {
        const container = document.getElementById('feed-render-engine');
        
        // Evitar duplicados por ID
        if (document.getElementById(`post-node-${post.id}`)) return;

        // Detector de Media (Imágenes/Links)
        const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp|svg))/i;
        const hasImg = post.texto.match(imgRegex);
        const textContent = post.texto.replace(imgRegex, '').trim();
        
        const isOwner = post.autor === SESSION_USER;
        const postDate = new Date(post.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        const postHTML = `
            <div class="nexus-card" id="post-node-${post.id}" style="opacity: 0; transform: translateY(20px)">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px">
                    <div style="display:flex; align-items:center; gap:12px">
                        <div class="avatar-ring">
                            <div class="avatar-box" style="width:40px; height:40px; font-size:0.9rem">
                                ${post.autor.charAt(0).toUpperCase()}
                            </div>
                        </div>
                        <div>
                            <p style="font-weight:700; font-size:0.95rem">${post.autor} 
                                ${post.autor === 'Sergio' ? '<i class="fas fa-check-circle" style="color:var(--primary); font-size:0.7rem"></i>' : ''}
                            </p>
                            <p style="font-size:0.7rem; color:var(--text-muted)">${postDate} • Global</p>
                        </div>
                    </div>
                    ${isOwner ? `
                        <button onclick="confirmDelete(${post.id})" class="nexus-btn" style="background:none; color:var(--text-muted); padding:5px; box-shadow:none">
                            <i class="fas fa-ellipsis-h"></i>
                        </button>
                    ` : ''}
                </div>

                <div style="font-size:1.05rem; line-height:1.6; color:var(--text-main); margin-bottom:15px; word-wrap: break-word;">
                    ${textContent || (hasImg ? '' : '<span style="color:var(--text-muted); font-style:italic;">Sin texto...</span>')}
                </div>

                ${hasImg ? `
                    <div style="border-radius:15px; overflow:hidden; border:1px solid var(--glass-border); margin-bottom:15px; background:#000">
                        <img src="${hasImg[0]}" style="width:100%; display:block; max-height:450px; object-fit:contain;" 
                             onload="this.parentElement.style.background='transparent'"
                             onerror="this.src='https://via.placeholder.com/400x200?text=Error+al+cargar+imagen'">
                    </div>
                ` : ''}

                <div style="display:flex; gap:25px; border-top:1px solid var(--glass-border); padding-top:15px">
                    <button onclick="handleLike(${post.id}, ${post.likes || 0})" class="nexus-btn" id="like-btn-${post.id}" 
                            style="background:none; padding:0; color:var(--text-dim); box-shadow:none; text-transform:none">
                        <i class="far fa-heart" id="like-icon-${post.id}"></i> 
                        <span id="like-count-${post.id}" style="margin-left:5px; font-weight:600">${post.likes || 0}</span>
                    </button>
                    
                    <button class="nexus-btn" style="background:none; padding:0; color:var(--text-dim); box-shadow:none; text-transform:none">
                        <i class="far fa-comment"></i> <span style="margin-left:5px; font-weight:600">Discutir</span>
                    </button>

                    <button class="nexus-btn" style="background:none; padding:0; color:var(--text-dim); box-shadow:none; text-transform:none; margin-left:auto">
                        <i class="far fa-share-square"></i>
                    </button>
                </div>
            </div>
        `;

        if (atTop) {
            container.insertAdjacentHTML('afterbegin', postHTML);
        } else {
            container.insertAdjacentHTML('beforeend', postHTML);
        }

        // Animación de entrada con GSAP
        gsap.to(`#post-node-${post.id}`, { duration: 0.6, opacity: 1, y: 0, ease: "power2.out" });
    }

    /* =========================================
       LOGIC: PUBLICAR Y GESTIONAR POSTS
       ========================================= */
    async function dispatchPost() {
        const input = document.getElementById('post-input-main');
        const btn = document.getElementById('btn-post');
        const text = input.value.trim();

        if (!text) return pushToast("⚠️ El post no puede estar vacío", "warning");

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

        try {
            const { error } = await db.from(NEXUS_CONFIG.TABLE_POSTS).insert([{
                autor: SESSION_USER,
                texto: text,
                likes: 0,
                created_at: new Date().toISOString()
            }]);

            if (error) throw error;

            input.value = '';
            pushToast("🚀 Sincronizado con el Nexo con éxito", "success");
        } catch (err) {
            pushToast(`❌ Error al publicar: ${err.message}`, "danger");
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'PUBLICAR <i class="fas fa-paper-plane"></i>';
        }
    }

    async function handleLike(postId, currentLikes) {
        const icon = document.getElementById(`like-icon-${postId}`);
        const countSpan = document.getElementById(`like-count-${postId}`);
        
        // Optimistic Update UI
        icon.classList.replace('far', 'fas');
        icon.style.color = 'var(--danger)';
        countSpan.innerText = parseInt(currentLikes) + 1;
        gsap.from(icon, {duration:0.4, scale:1.5, ease:"back.out"});

        const { error } = await db.from(NEXUS_CONFIG.TABLE_POSTS)
            .update({ likes: currentLikes + 1 })
            .eq('id', postId);

        if (error) {
            pushToast("No se pudo registrar el like", "warning");
            icon.classList.replace('fas', 'far');
            countSpan.innerText = currentLikes;
        }
    }

    async function confirmDelete(postId) {
        if (confirm("¿Seguro que quieres purgar este post del sistema?")) {
            const { error } = await db.from(NEXUS_CONFIG.TABLE_POSTS).delete().eq('id', postId);
            if (error) pushToast("Error al eliminar", "danger");
            else pushToast("🧹 Post eliminado del servidor", "primary");
        }
    }

    function updatePostUI(post) {
        const countSpan = document.getElementById(`like-count-${post.id}`);
        if (countSpan) countSpan.innerText = post.likes;
    }

    /* =========================================
       LOGIC: PERFIL Y SEGURIDAD
       ========================================= */
    async function updateSecurity() {
        const newPass = document.getElementById('profile-new-pass').value;
        if (!newPass || newPass.length < 4) return pushToast("⚠️ Contraseña muy corta", "warning");

        const { error } = await db.from(NEXUS_CONFIG.TABLE_USERS)
            .update({ password: newPass })
            .eq('username', SESSION_USER);

        if (error) pushToast("Error de servidor", "danger");
        else {
            pushToast("🔒 Seguridad actualizada correctamente", "success");
            document.getElementById('profile-new-pass').value = '';
        }
    }

    /* =========================================
       AJUSTES DE RESPONSIVIDAD (MÓVIL)
       ========================================= */
    function checkMobile() {
        if (window.innerWidth < 1100) {
            document.getElementById('nexus-app-root').style.gridTemplateColumns = "80px 1fr 0px";
            document.querySelectorAll('.nav-link span, .nav-brand').forEach(el => el.style.display = 'none');
            document.querySelector('.nexus-widgets').style.display = 'none';
        } else {
            document.getElementById('nexus-app-root').style.gridTemplateColumns = "280px 1fr 350px";
            document.querySelectorAll('.nav-link span, .nav-brand').forEach(el => el.style.display = 'flex');
            document.querySelector('.nexus-widgets').style.display = 'block';
        }
    }

    window.addEventListener('resize', checkMobile);
    checkMobile();

</script>
</body>
</html>
