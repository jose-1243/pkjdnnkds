<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DEBUGGER SUPABASE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .input-area { border: 1px solid #0f0; padding: 20px; margin-bottom: 20px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 5px; }
        button { background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        #console { white-space: pre-wrap; border-top: 1px solid #444; margin-top: 20px; padding-top: 10px; color: #0ff; }
        .err { color: #f00; font-weight: bold; }
        .ok { color: #0f0; }
    </style>
</head>
<body>

    <div class="input-area">
        [ LOGIN DE PRUEBA ]<br><br>
        USUARIO: <input type="text" id="u" autocomplete="off"><br><br>
        CLAVE:   <input type="password" id="p"><br><br>
        <button onclick="runDebug()">EJECUTAR DIAGNÓSTICO FORZADO</button>
    </div>

    <div id="console">>> Esperando ejecución...</div>

    <script>
        const URL = "https://cmqgzwgqvpxuzmivxjcp.supabase.co";
        const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtcWd6d2dxdnB4dXptaXZ4amNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDk0NzQsImV4cCI6MjA5MDEyNTQ3NH0.yxukU3-y26DNLdCfEymPNgUSGmHorhuQNPng_fEkWOo";
        const supabaseClient = supabase.createClient(URL, KEY);

        async function print(msg, type = '') {
            const c = document.getElementById('console');
            const span = document.createElement('div');
            span.className = type;
            span.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            c.appendChild(span);
        }

        async function runDebug() {
            const userVal = document.getElementById('u').value;
            const passVal = document.getElementById('p').value;
            document.getElementById('console').innerHTML = ""; // Limpiar

            print("--- INICIANDO ESCANEO DE ERRORES ---");

            // PASO 1: Probar conexión básica
            print("Paso 1: Verificando tabla 'usuarios'...");
            const { data: testData, error: testErr } = await supabaseClient
                .from('usuarios')
                .select('*')
                .limit(1);

            if (testErr) {
                print(`ERROR CRÍTICO: ${testErr.message}`, 'err');
                print(`CÓDIGO ERROR: ${testErr.code}`, 'err');
                print(`PISTA: Si el código es '42P01', la tabla 'usuarios' NO EXISTE.`, 'err');
                print(`PISTA: Si el código es '42501', el RLS está ACTIVADO y bloquea la lectura.`, 'err');
                return;
            }
            print("Paso 1 OK: Tabla encontrada.", 'ok');

            // PASO 2: Ver columnas
            if (testData.length > 0) {
                const cols = Object.keys(testData[0]);
                print(`Columnas detectadas: ${cols.join(", ")}`);
                if (!cols.includes('username') || !cols.includes('password')) {
                    print("AVISO: Las columnas no se llaman 'username' o 'password'. Revisa tu SQL.", 'err');
                }
            } else {
                print("AVISO: La tabla está VACÍA. Inserta un usuario en Supabase.", 'err');
            }

            // PASO 3: Intento de Login
            print(`Paso 3: Buscando usuario: "${userVal}" con clave: "${passVal}"...`);
            const { data: loginData, error: loginErr } = await supabaseClient
                .from('usuarios')
                .select('*')
                .eq('username', userVal)
                .eq('password', passVal);

            if (loginData && loginData.length > 0) {
                print("¡ÉXITO! Usuario encontrado.", 'ok');
                print(`ID del usuario: ${loginData[0].id}`, 'ok');
            } else {
                print("FALLO: La consulta no devolvió ninguna fila.", 'err');
                print("CAUSA POSIBLE: Usuario o clave mal escritos (revisa mayúsculas/espacios).", 'err');
            }
        }
    </script>
</body>
</html>
